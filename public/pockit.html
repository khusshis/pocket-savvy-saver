<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Pockit — Your money, your story.</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🐷</text></svg>" />
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
<script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
<style>
  :root{
    --bg:#0A0F1C; --bg-2:#0F1729; --text:#F8FAFC; --primary:#22C55E; --primary-glow:#4ADE80;
    --expense:#F87171; --secondary:#60A5FA; --accent:#A78BFA;
    --surface:rgba(30,41,59,.55); --surface-solid:#1E293B;
    --border:rgba(148,163,184,.12); --border-strong:rgba(148,163,184,.22);
    --muted:#94A3B8;
    --grad-primary:linear-gradient(135deg,#22C55E 0%,#4ADE80 100%);
    --grad-card:linear-gradient(145deg,rgba(255,255,255,.04) 0%,rgba(255,255,255,.01) 100%);
    --shadow-glow:0 0 40px -10px rgba(34,197,94,.35);
    --shadow-soft:0 10px 30px -10px rgba(0,0,0,.5);
    --ease:cubic-bezier(.4,0,.2,1);
    --ease-spring:cubic-bezier(.34,1.56,.64,1);
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{
    background:var(--bg);color:var(--text);
    font-family:'Plus Jakarta Sans',sans-serif;font-weight:400;min-height:100vh;
    -webkit-font-smoothing:antialiased;overflow-x:hidden;
  }
  body::before{
    content:'';position:fixed;inset:0;z-index:-1;pointer-events:none;
    background:
      radial-gradient(circle at 15% 20%,rgba(34,197,94,.12),transparent 45%),
      radial-gradient(circle at 85% 75%,rgba(96,165,250,.10),transparent 50%),
      radial-gradient(circle at 50% 100%,rgba(167,139,250,.08),transparent 55%);
  }
  button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit}
  input,select,textarea{font-family:inherit}
  a{color:inherit;text-decoration:none}
  ::-webkit-scrollbar{width:8px;height:8px}
  ::-webkit-scrollbar-track{background:transparent}
  ::-webkit-scrollbar-thumb{background:rgba(148,163,184,.18);border-radius:4px}
  ::-webkit-scrollbar-thumb:hover{background:rgba(148,163,184,.3)}

  /* Layout */
  .app{display:flex;min-height:100vh}
  .sidebar{
    width:248px;background:rgba(15,23,41,.7);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);
    border-right:1px solid var(--border);
    padding:1.5rem 0;position:fixed;top:0;left:0;bottom:0;display:flex;flex-direction:column;z-index:10
  }
  .brand{padding:0 1.5rem 1.5rem;display:flex;align-items:center;gap:.7rem;border-bottom:1px solid var(--border)}
  .brand-logo{
    font-size:1.6rem;width:42px;height:42px;display:grid;place-items:center;
    background:var(--grad-primary);border-radius:12px;box-shadow:var(--shadow-glow);
    transition:transform .4s var(--ease-spring);
  }
  .brand:hover .brand-logo{transform:rotate(-8deg) scale(1.08)}
  .brand-name{font-weight:700;font-size:1.2rem;letter-spacing:-.02em;background:linear-gradient(135deg,#fff,#94A3B8);-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent}
  .brand-tag{font-size:.68rem;color:var(--muted);margin-top:1px;letter-spacing:.01em}
  .nav{padding:1rem .75rem;flex:1;overflow-y:auto;display:flex;flex-direction:column;gap:.2rem}
  .nav-item{
    display:flex;align-items:center;gap:.75rem;padding:.7rem .9rem;border-radius:10px;
    color:var(--muted);font-weight:500;font-size:.88rem;position:relative;
    transition:all .25s var(--ease);width:100%;text-align:left;overflow:hidden;
  }
  .nav-item::before{
    content:'';position:absolute;inset:0;background:var(--grad-primary);opacity:0;
    transition:opacity .3s var(--ease);z-index:-1;
  }
  .nav-item:hover{color:var(--text);background:rgba(255,255,255,.04);transform:translateX(2px)}
  .nav-item.active{color:#0A0F1C;font-weight:600;background:var(--grad-primary);box-shadow:0 8px 20px -8px rgba(34,197,94,.5)}
  .nav-item i{width:18px;height:18px;transition:transform .3s var(--ease)}
  .nav-item:hover i{transform:scale(1.15)}
  .main{margin-left:248px;flex:1;padding:2rem;min-width:0}
  .page-head{margin-bottom:1.75rem;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:1rem}
  .page-title{font-size:1.85rem;font-weight:700;letter-spacing:-.025em;background:linear-gradient(135deg,#fff 0%,#cbd5e1 100%);-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent}
  .page-sub{color:var(--muted);font-size:.9rem;margin-top:.3rem}

  /* Cards */
  .card{
    background:var(--surface);backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px);
    border:1px solid var(--border);border-radius:18px;padding:1.5rem;
    box-shadow:var(--shadow-soft);transition:all .35s var(--ease);position:relative;overflow:hidden;
  }
  .card::before{
    content:'';position:absolute;top:0;left:0;right:0;height:1px;
    background:linear-gradient(90deg,transparent,rgba(255,255,255,.1),transparent);
  }
  .card:hover{border-color:var(--border-strong);transform:translateY(-2px);box-shadow:0 20px 40px -15px rgba(0,0,0,.5)}
  .grid{display:grid;gap:1.25rem}
  .grid-4{grid-template-columns:repeat(4,1fr)}
  .grid-2{grid-template-columns:repeat(2,1fr)}
  .stat-card{display:flex;flex-direction:column;gap:.5rem;position:relative}
  .stat-card::after{
    content:'';position:absolute;top:-1px;right:-1px;width:80px;height:80px;
    background:radial-gradient(circle at top right,currentColor,transparent 70%);
    opacity:.08;border-radius:18px;pointer-events:none;
  }
  .stat-head{display:flex;align-items:center;gap:.5rem;color:var(--muted);font-size:.8rem;font-weight:500;text-transform:uppercase;letter-spacing:.05em}
  .stat-head i{width:16px;height:16px}
  .stat-value{font-size:1.85rem;font-weight:700;letter-spacing:-.025em}
  .stat-sub{font-size:.75rem;color:var(--muted)}
  .positive{color:var(--primary)} .negative{color:var(--expense)} .info{color:var(--secondary)}

  /* Forms */
  .form{display:grid;gap:1rem}
  .form-row{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:1rem}
  label{display:block;font-size:.78rem;color:var(--muted);margin-bottom:.4rem;font-weight:500;letter-spacing:.02em}
  input,select,textarea{
    width:100%;background:rgba(10,15,28,.6);border:1px solid var(--border);border-radius:10px;
    padding:.7rem .85rem;color:var(--text);font-size:.9rem;
    transition:all .25s var(--ease);outline:none
  }
  input:focus,select:focus,textarea:focus{border-color:var(--primary);box-shadow:0 0 0 3px rgba(34,197,94,.15);background:rgba(10,15,28,.85)}
  textarea{resize:vertical;min-height:60px}
  .btn{
    background:var(--grad-primary);color:#0A0F1C;font-weight:600;padding:.7rem 1.2rem;border-radius:10px;
    font-size:.88rem;display:inline-flex;align-items:center;gap:.45rem;
    transition:all .25s var(--ease);position:relative;overflow:hidden;
    box-shadow:0 4px 14px -4px rgba(34,197,94,.5);
  }
  .btn::after{
    content:'';position:absolute;inset:0;background:linear-gradient(120deg,transparent 30%,rgba(255,255,255,.3) 50%,transparent 70%);
    transform:translateX(-100%);transition:transform .6s var(--ease);
  }
  .btn:hover{transform:translateY(-2px);box-shadow:0 8px 22px -4px rgba(34,197,94,.6)}
  .btn:hover::after{transform:translateX(100%)}
  .btn:active{transform:translateY(0)}
  .btn-secondary{background:linear-gradient(135deg,#60A5FA,#3B82F6);box-shadow:0 4px 14px -4px rgba(96,165,250,.5)}
  .btn-secondary:hover{box-shadow:0 8px 22px -4px rgba(96,165,250,.6)}
  .btn-danger{background:linear-gradient(135deg,#F87171,#EF4444);box-shadow:0 4px 14px -4px rgba(248,113,113,.5)}
  .btn-ghost{background:transparent;color:var(--muted);border:1px solid var(--border-strong);box-shadow:none}
  .btn-ghost::after{display:none}
  .btn-ghost:hover{color:var(--text);border-color:var(--text);background:rgba(255,255,255,.04)}
  .btn-sm{padding:.45rem .8rem;font-size:.78rem}
  .err{color:var(--expense);font-size:.75rem;margin-top:.3rem;display:none}
  .err.show{display:block;animation:slidein .25s var(--ease)}

  /* Tables */
  .table-wrap{overflow-x:auto;border-radius:12px}
  table{width:100%;border-collapse:collapse;font-size:.9rem}
  th,td{padding:.85rem .75rem;text-align:left;border-bottom:1px solid var(--border)}
  th{color:var(--muted);font-weight:600;font-size:.72rem;text-transform:uppercase;letter-spacing:.06em;cursor:pointer;user-select:none;transition:color .2s}
  th:hover{color:var(--text)}
  tbody tr{transition:all .2s var(--ease)}
  tr:hover td{background:rgba(255,255,255,.025)}
  .badge{display:inline-block;padding:.25rem .6rem;border-radius:999px;font-size:.7rem;font-weight:600;background:rgba(96,165,250,.15);color:var(--secondary);letter-spacing:.02em}
  .badge-green{background:rgba(34,197,94,.15);color:var(--primary)}
  .badge-red{background:rgba(248,113,113,.15);color:var(--expense)}
  .row-actions{display:flex;gap:.4rem;justify-content:flex-end}
  .icon-btn{padding:.4rem;border-radius:8px;color:var(--muted);transition:all .2s var(--ease)}
  .icon-btn:hover{color:var(--text);background:rgba(255,255,255,.06);transform:scale(1.1)}
  .icon-btn.danger:hover{color:var(--expense);background:rgba(248,113,113,.1)}

  /* Empty */
  .empty{text-align:center;padding:3rem 1rem;color:var(--muted)}
  .empty i{width:48px;height:48px;opacity:.4;margin-bottom:.75rem}
  .empty-title{font-size:1rem;color:var(--text);margin-bottom:.25rem;font-weight:600}

  /* Progress */
  .progress{height:8px;background:rgba(10,15,28,.6);border-radius:99px;overflow:hidden;margin-top:.5rem}
  .progress-bar{height:100%;background:var(--grad-primary);transition:width .6s var(--ease-spring);border-radius:99px;box-shadow:0 0 10px rgba(34,197,94,.4)}
  .progress-bar.warn{background:linear-gradient(135deg,#fbbf24,#f59e0b);box-shadow:0 0 10px rgba(245,158,11,.4)}
  .progress-bar.danger{background:linear-gradient(135deg,#F87171,#EF4444);box-shadow:0 0 10px rgba(248,113,113,.4)}

  /* Modal */
  .modal-backdrop{position:fixed;inset:0;background:rgba(0,0,0,.65);backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);display:none;align-items:center;justify-content:center;z-index:50;padding:1rem;animation:fade .25s var(--ease)}
  .modal-backdrop.show{display:flex}
  .modal{
    background:linear-gradient(145deg,rgba(30,41,59,.95),rgba(15,23,41,.95));
    backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);
    border:1px solid var(--border-strong);border-radius:20px;padding:1.75rem;max-width:480px;width:100%;
    animation:popin .35s var(--ease-spring);box-shadow:0 25px 60px -10px rgba(0,0,0,.7)
  }
  .modal-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:1.25rem}
  .modal-title{font-size:1.15rem;font-weight:700;letter-spacing:-.01em}
  .modal-actions{display:flex;gap:.5rem;justify-content:flex-end;margin-top:1.5rem}
  @keyframes fade{from{opacity:0}to{opacity:1}}
  @keyframes popin{from{opacity:0;transform:scale(.92) translateY(10px)}to{opacity:1;transform:scale(1) translateY(0)}}
  @keyframes slidein{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
  @keyframes shimmer{0%{background-position:-200% 0}100%{background-position:200% 0}}
  .fade-in{animation:slidein .4s var(--ease)}

  /* Toast */
  .toast-wrap{position:fixed;bottom:1.25rem;right:1.25rem;display:flex;flex-direction:column;gap:.5rem;z-index:100}
  .toast{
    background:linear-gradient(145deg,rgba(30,41,59,.95),rgba(15,23,41,.95));
    backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);
    border:1px solid var(--border-strong);border-left:3px solid var(--primary);
    border-radius:12px;padding:.85rem 1.1rem;font-size:.85rem;min-width:260px;
    box-shadow:0 12px 30px rgba(0,0,0,.5);animation:slidein .3s var(--ease-spring)
  }
  .toast.err{border-left-color:var(--expense)}
  .toast.info{border-left-color:var(--secondary)}

  /* Alerts */
  .alert{padding:.9rem 1.1rem;border-radius:12px;font-size:.85rem;display:flex;gap:.6rem;align-items:center;margin-bottom:1rem;animation:slidein .3s var(--ease)}
  .alert-warn{background:rgba(245,158,11,.1);border:1px solid rgba(245,158,11,.3);color:#fbbf24}
  .alert-danger{background:rgba(248,113,113,.1);border:1px solid rgba(248,113,113,.3);color:var(--expense)}
  .alert-info{background:rgba(96,165,250,.1);border:1px solid rgba(96,165,250,.3);color:var(--secondary)}

  /* Charts */
  .chart-box{position:relative;height:280px}

  /* Insights strip */
  .insights{display:grid;grid-template-columns:repeat(4,1fr);gap:1rem}
  .insight{
    background:var(--surface);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);
    border:1px solid var(--border);border-radius:14px;padding:1rem;display:flex;gap:.75rem;align-items:center;
    transition:all .3s var(--ease);
  }
  .insight:hover{transform:translateY(-2px);border-color:var(--border-strong)}
  .insight-icon{width:40px;height:40px;border-radius:10px;background:rgba(34,197,94,.12);display:flex;align-items:center;justify-content:center;color:var(--primary);flex-shrink:0;transition:transform .3s var(--ease-spring)}
  .insight:hover .insight-icon{transform:scale(1.1) rotate(-5deg)}
  .insight-icon.b{background:rgba(96,165,250,.12);color:var(--secondary)}
  .insight-icon.r{background:rgba(248,113,113,.12);color:var(--expense)}
  .insight-label{font-size:.68rem;color:var(--muted);text-transform:uppercase;letter-spacing:.06em;font-weight:600}
  .insight-val{font-size:1.05rem;font-weight:700;margin-top:2px;letter-spacing:-.01em}

  /* Activity */
  .activity{display:flex;flex-direction:column;gap:.4rem}
  .activity-item{display:flex;align-items:center;gap:.85rem;padding:.7rem;border-radius:10px;transition:all .25s var(--ease)}
  .activity-item:hover{background:rgba(255,255,255,.035);transform:translateX(4px)}
  .act-icon{width:38px;height:38px;border-radius:10px;display:flex;align-items:center;justify-content:center;background:rgba(248,113,113,.12);color:var(--expense);flex-shrink:0;transition:transform .3s var(--ease-spring)}
  .activity-item:hover .act-icon{transform:scale(1.1)}
  .act-icon.in{background:rgba(34,197,94,.12);color:var(--primary)}
  .act-meta{flex:1;min-width:0}
  .act-title{font-size:.88rem;font-weight:600}
  .act-sub{font-size:.74rem;color:var(--muted);margin-top:1px}
  .act-amt{font-weight:700;font-size:.95rem;letter-spacing:-.01em}

  /* Savings gauge */
  .gauge{position:relative;display:flex;align-items:center;justify-content:center;height:200px}
  .gauge canvas{max-width:200px}
  .gauge-val{position:absolute;text-align:center}
  .gauge-num{font-size:1.85rem;font-weight:700;letter-spacing:-.025em;background:var(--grad-primary);-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent}
  .gauge-lbl{font-size:.72rem;color:var(--muted);text-transform:uppercase;letter-spacing:.05em;font-weight:600}

  /* Filters */
  .filters{display:flex;gap:.75rem;flex-wrap:wrap;margin-bottom:1rem}
  .filters > *{flex:1;min-width:140px}

  /* Page sections */
  .page{display:none}
  .page.active{display:block;animation:slidein .4s var(--ease)}

  /* Suggestion */
  .sugg-list{display:flex;flex-direction:column;gap:.5rem;margin-top:1rem}

  /* Goals */
  .goal-card{
    background:var(--surface);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);
    border:1px solid var(--border);border-radius:16px;padding:1.35rem;display:flex;flex-direction:column;gap:.5rem;
    transition:all .3s var(--ease);
  }
  .goal-card:hover{transform:translateY(-3px);border-color:var(--border-strong);box-shadow:var(--shadow-soft)}
  .goal-head{display:flex;justify-content:space-between;align-items:start;gap:.5rem}
  .goal-title{font-weight:700;letter-spacing:-.01em}
  .goal-meta{font-size:.75rem;color:var(--muted)}

  /* Tabs */
  .tabs{display:flex;gap:.25rem;background:rgba(10,15,28,.6);padding:.3rem;border-radius:12px;width:fit-content;margin-bottom:1.25rem;border:1px solid var(--border)}
  .tab{padding:.5rem 1rem;border-radius:9px;font-size:.85rem;color:var(--muted);font-weight:500;transition:all .25s var(--ease)}
  .tab:hover{color:var(--text)}
  .tab.active{background:var(--grad-primary);color:#0A0F1C;font-weight:600;box-shadow:0 4px 12px -2px rgba(34,197,94,.4)}

  /* Confirm modal text */
  .confirm-msg{color:var(--muted);font-size:.9rem;line-height:1.6}

  /* Report output */
  pre.report{
    background:rgba(10,15,28,.6);border:1px solid var(--border);border-radius:12px;padding:1.25rem;
    font-family:'Plus Jakarta Sans',monospace;font-size:.85rem;white-space:pre-wrap;color:var(--text);max-height:480px;overflow-y:auto;line-height:1.6
  }

  /* Responsive */
  @media (max-width:880px){
    .grid-4{grid-template-columns:repeat(2,1fr)}
    .grid-2{grid-template-columns:1fr}
    .insights{grid-template-columns:repeat(2,1fr)}
  }
  @media (max-width:720px){
    .sidebar{
      width:100%;height:64px;top:auto;bottom:0;flex-direction:row;padding:0;
      border-top:1px solid var(--border-strong);border-right:none;overflow-x:auto;
      background:rgba(10,15,28,.85);
    }
    .brand{display:none}
    .nav{display:flex;flex-direction:row;padding:.4rem;width:100%;gap:.2rem}
    .nav-item{flex-direction:column;gap:.2rem;padding:.4rem .65rem;border-radius:10px;font-size:.62rem;flex-shrink:0;min-width:64px;justify-content:center}
    .nav-item:hover{transform:none}
    .main{margin-left:0;margin-bottom:64px;padding:1.1rem}
    .page-title{font-size:1.45rem}
    .stat-value{font-size:1.45rem}
  }
</style>
</head>
<body>
<div class="app">
  <aside class="sidebar">
    <div class="brand">
      <div class="brand-logo">🐷</div>
      <div>
        <div class="brand-name">Pockit</div>
        <div class="brand-tag">Your money, your story.</div>
      </div>
    </div>
    <nav class="nav" id="nav"></nav>
  </aside>

  <main class="main" id="main"></main>
</div>

<div class="modal-backdrop" id="modal">
  <div class="modal" id="modalContent"></div>
</div>
<div class="toast-wrap" id="toasts"></div>

<script>
/* ============= STATE ============= */
const STORAGE_KEY = 'pockit_data';
const DEFAULTS = {
  expenses: [], income: [], piggyBank: [],
  budget: { monthly: 0, categories: {} },
  goals: []
};
const EXPENSE_CATEGORIES = ['Food','Travel','Shopping','Bills','Health','Entertainment','Education','Other'];
const INCOME_SOURCES = ['Salary','Freelance','Pocket Money','Gift','Investment','Other'];
const CATEGORY_ICONS = {
  Food:'utensils',Travel:'plane',Shopping:'shopping-bag',Bills:'receipt',
  Health:'heart-pulse',Entertainment:'film',Education:'graduation-cap',Other:'circle'
};

let state = load();
let charts = {};

function load(){
  try{
    const raw = localStorage.getItem(STORAGE_KEY);
    if(!raw) return structuredClone(DEFAULTS);
    const d = JSON.parse(raw);
    return {...structuredClone(DEFAULTS), ...d, budget:{...DEFAULTS.budget,...(d.budget||{})}};
  }catch(e){return structuredClone(DEFAULTS)}
}
function save(){ localStorage.setItem(STORAGE_KEY, JSON.stringify(state)); }
function uid(){ return Date.now().toString(36)+Math.random().toString(36).slice(2,7); }

/* ============= HELPERS ============= */
const fmt = n => '₹' + Math.round(Number(n)||0).toLocaleString('en-IN');
const today = () => new Date().toISOString().slice(0,10);
const ym = d => d.slice(0,7);
const monthName = (s) => new Date(s+'-01').toLocaleString('en-IN',{month:'short',year:'numeric'});

function totals(list, key='amount'){ return list.reduce((s,x)=>s+(Number(x[key])||0),0); }

function piggyBalance(){
  return state.piggyBank.reduce((s,t)=>s + (t.type==='deposit'?Number(t.amount):-Number(t.amount)),0);
}

function inRange(dateStr, from, to){
  if(from && dateStr < from) return false;
  if(to && dateStr > to) return false;
  return true;
}

function periodFilter(items, period){
  const now = new Date();
  if(period==='all') return items;
  const limit = new Date();
  if(period==='week') limit.setDate(now.getDate()-7);
  else if(period==='month') limit.setMonth(now.getMonth()-1);
  else if(period==='year') limit.setFullYear(now.getFullYear()-1);
  const cutoff = limit.toISOString().slice(0,10);
  return items.filter(x=>x.date >= cutoff);
}

/* ============= TOAST ============= */
function toast(msg, type=''){
  const el = document.createElement('div');
  el.className = 'toast '+type;
  el.textContent = msg;
  document.getElementById('toasts').appendChild(el);
  setTimeout(()=>{ el.style.opacity='0'; el.style.transition='opacity .3s'; setTimeout(()=>el.remove(),300); }, 2400);
}

/* ============= MODAL ============= */
function openModal(html){
  document.getElementById('modalContent').innerHTML = html;
  document.getElementById('modal').classList.add('show');
}
function closeModal(){ document.getElementById('modal').classList.remove('show'); }
document.getElementById('modal').addEventListener('click', e=>{ if(e.target.id==='modal') closeModal(); });
document.addEventListener('keydown', e=>{ if(e.key==='Escape') closeModal(); });

function confirmModal(title, msg, onYes){
  openModal(`
    <div class="modal-head"><div class="modal-title">${title}</div>
      <button class="icon-btn" onclick="closeModal()"><i data-lucide="x"></i></button></div>
    <div class="confirm-msg">${msg}</div>
    <div class="modal-actions">
      <button class="btn btn-ghost" onclick="closeModal()">Cancel</button>
      <button class="btn btn-danger" id="confirmYes">Delete</button>
    </div>`);
  lucide.createIcons();
  document.getElementById('confirmYes').onclick = ()=>{ onYes(); closeModal(); };
}

/* ============= DASHBOARD ============= */
function calcStreak(){
  // consecutive days from today going back where daily expense <= daily budget allowance
  const dailyBudget = state.budget.monthly ? state.budget.monthly/30 : Infinity;
  let streak = 0;
  for(let i=0;i<365;i++){
    const d = new Date(); d.setDate(d.getDate()-i);
    const s = d.toISOString().slice(0,10);
    const spent = state.expenses.filter(e=>e.date===s).reduce((a,b)=>a+Number(b.amount),0);
    if(spent <= dailyBudget) streak++; else break;
  }
  return streak;
}

function noSpendDays(){
  const now = new Date();
  const month = now.toISOString().slice(0,7);
  const daysInMonth = new Date(now.getFullYear(), now.getMonth()+1, 0).getDate();
  const today = now.getDate();
  const spent = new Set(state.expenses.filter(e=>e.date.startsWith(month)).map(e=>e.date));
  let count = 0;
  for(let d=1; d<=today; d++) if(!spent.has(`${month}-${String(d).padStart(2,'0')}`)) count++;
  return count;
}

function topCategory(){
  const map = {};
  state.expenses.forEach(e=>map[e.category]=(map[e.category]||0)+Number(e.amount));
  let top = null, max = 0;
  for(const k in map) if(map[k]>max){max=map[k];top=k;}
  return top ? {name:top, amount:max} : null;
}

function highestExpense(){
  return state.expenses.reduce((a,b)=> (!a||Number(b.amount)>Number(a.amount))?b:a, null);
}

function suggestions(){
  const out = [];
  const totalExp = totals(state.expenses);
  const totalInc = totals(state.income);
  const food = state.expenses.filter(e=>e.category==='Food').reduce((s,e)=>s+Number(e.amount),0);
  if(totalExp && food/totalExp > 0.4) out.push({icon:'utensils', msg:'Food is over 40% of your spend. Consider meal prepping 🍱'});
  const rate = totalInc ? (totalInc-totalExp)/totalInc*100 : 0;
  if(totalInc && rate < 10) out.push({icon:'lightbulb', msg:'Savings rate below 10%. Try the 50/30/20 rule 💡'});
  const month = new Date().toISOString().slice(0,7);
  if(!state.income.some(i=>i.date.startsWith(month))) out.push({icon:'alert-circle', msg:"You haven't logged income this month ☝"});
  if(!out.length) out.push({icon:'sparkles', msg:"You're doing great! Keep tracking consistently ✨"});
  return out;
}

function statCard(icon, label, value, cls=''){
  return `<div class="card stat-card">
    <div class="stat-head"><i data-lucide="${icon}"></i> ${label}</div>
    <div class="stat-value ${cls}" data-count="${value}">${fmt(value)}</div>
  </div>`;
}

function animateCounters(){
  document.querySelectorAll('[data-count]').forEach(el=>{
    const target = Number(el.dataset.count);
    if(!isFinite(target) || Math.abs(target)<100) return;
    const dur = 600, start = performance.now();
    function step(now){
      const p = Math.min(1, (now-start)/dur);
      const v = target * (1 - Math.pow(1-p,3));
      el.textContent = fmt(v);
      if(p<1) requestAnimationFrame(step); else el.textContent = fmt(target);
    }
    requestAnimationFrame(step);
  });
}

function drawExpTable(){
  let rows = state.expenses.filter(e=>{
    if(expFilter.category && e.category!==expFilter.category) return false;
    if(!inRange(e.date, expFilter.from, expFilter.to)) return false;
    if(expFilter.min && Number(e.amount) < Number(expFilter.min)) return false;
    if(expFilter.max && Number(e.amount) > Number(expFilter.max)) return false;
    return true;
  });
  rows.sort((a,b)=>{
    const dir = expFilter.dir==='asc'?1:-1;
    if(expFilter.sort==='amount') return (Number(a.amount)-Number(b.amount))*dir;
    if(expFilter.sort==='category') return a.category.localeCompare(b.category)*dir;
    return a.date.localeCompare(b.date)*dir;
  });
  const el = document.getElementById('expTable');
  if(!rows.length){
    el.innerHTML = `<div class="empty"><i data-lucide="inbox"></i><div class="empty-title">No expenses found</div><div>Add your first expense to get started.</div></div>`;
    lucide.createIcons(); return;
  }
  el.innerHTML = `<div class="table-wrap"><table>
    <thead><tr>
      <th data-sort="date">Date</th><th data-sort="category">Category</th>
      <th>Notes</th><th data-sort="amount" style="text-align:right">Amount</th><th></th>
    </tr></thead>
    <tbody>${rows.map(r=>`<tr>
      <td>${r.date}</td>
      <td><span class="badge"><i data-lucide="${CATEGORY_ICONS[r.category]||'circle'}" style="width:11px;height:11px;display:inline-block;vertical-align:middle"></i> ${r.category}</span></td>
      <td style="color:var(--muted)">${r.notes||'—'}</td>
      <td style="text-align:right" class="negative">${fmt(r.amount)}</td>
      <td><div class="row-actions">
        <button class="icon-btn" onclick="expenseForm('${r.id}')"><i data-lucide="pencil"></i></button>
        <button class="icon-btn danger" onclick="deleteExpense('${r.id}')"><i data-lucide="trash-2"></i></button>
      </div></td>
    </tr>`).join('')}</tbody></table></div>`;
  el.querySelectorAll('th[data-sort]').forEach(th=>{
    th.onclick = ()=>{
      const s = th.dataset.sort;
      if(expFilter.sort===s) expFilter.dir = expFilter.dir==='asc'?'desc':'asc';
      else { expFilter.sort=s; expFilter.dir='desc'; }
      drawExpTable();
    };
  });
  lucide.createIcons();
}

function expenseForm(id){
  const item = id ? state.expenses.find(e=>e.id===id) : null;
  openModal(`
    <div class="modal-head"><div class="modal-title">${item?'Edit':'Add'} Expense</div>
      <button class="icon-btn" onclick="closeModal()"><i data-lucide="x"></i></button></div>
    <form class="form" id="expForm">
      <div><label>Amount (₹)</label><input type="number" step="0.01" min="0.01" id="eAmt" value="${item?.amount||''}" required/>
        <div class="err" id="eAmtErr">Enter a valid amount</div></div>
      <div class="form-row">
        <div><label>Category</label><select id="eCat" required>${EXPENSE_CATEGORIES.map(c=>`<option ${item?.category===c?'selected':''}>${c}</option>`).join('')}</select></div>
        <div><label>Date</label><input type="date" id="eDate" value="${item?.date||today()}" required/></div>
      </div>
      <div><label>Notes (optional)</label><textarea id="eNotes">${item?.notes||''}</textarea></div>
      <div class="modal-actions">
        <button type="button" class="btn btn-ghost" onclick="closeModal()">Cancel</button>
        <button type="submit" class="btn">${item?'Update':'Add'}</button>
      </div>
    </form>`);
  lucide.createIcons();
  document.getElementById('expForm').onsubmit = e=>{
    e.preventDefault();
    const amt = Number(document.getElementById('eAmt').value);
    if(!amt || amt<=0){ document.getElementById('eAmtErr').classList.add('show'); return; }
    const payload = {
      amount: amt,
      category: document.getElementById('eCat').value,
      date: document.getElementById('eDate').value,
      notes: document.getElementById('eNotes').value.trim()
    };
    if(item){ Object.assign(item, payload); toast('Expense updated'); }
    else { state.expenses.push({id:uid(), ...payload, createdAt:new Date().toISOString()}); toast('Expense added'); }
    save(); closeModal(); renderPage();
  };
}
function deleteExpense(id){
  confirmModal('Delete expense?','This action cannot be undone.',()=>{
    state.expenses = state.expenses.filter(e=>e.id!==id); save(); renderPage(); toast('Expense deleted','err');
  });
}

function drawAnalytics(){
  Object.values(charts).forEach(c=>c&&c.destroy()); charts={};
  Chart.defaults.color = '#9CA3AF';

  const catMap = {};
  state.expenses.forEach(e=>catMap[e.category]=(catMap[e.category]||0)+Number(e.amount));
  const aCat = document.getElementById('aCat');
  if(aCat){
    charts.aCat = new Chart(aCat, {
      type:'doughnut',
      data:{labels:Object.keys(catMap), datasets:[{data:Object.values(catMap), backgroundColor:['#22C55E','#60A5FA','#F87171','#FBBF24','#A78BFA','#34D399','#F472B6','#9CA3AF'], borderColor:'#1F2937',borderWidth:2}]},
      options:{plugins:{legend:{position:'bottom',labels:{boxWidth:10,padding:12,font:{size:11}}}}, cutout:'58%'}
    });
  }
  const months = [];
  for(let i=5;i>=0;i--){ const d=new Date(); d.setMonth(d.getMonth()-i); months.push(d.toISOString().slice(0,7)); }
  const expData = months.map(m=>state.expenses.filter(e=>e.date.startsWith(m)).reduce((s,e)=>s+Number(e.amount),0));
  const incData = months.map(m=>state.income.filter(e=>e.date.startsWith(m)).reduce((s,e)=>s+Number(e.amount),0));
  const aBar = document.getElementById('aBar');
  if(aBar){
    charts.aBar = new Chart(aBar,{type:'bar',
      data:{labels:months.map(monthName), datasets:[{label:'Expenses',data:expData,backgroundColor:'#F87171',borderRadius:6}]},
      options:{plugins:{legend:{display:false}}, scales:{y:{grid:{color:'#374151'},ticks:{callback:v=>'₹'+v}},x:{grid:{display:false}}}}});
  }
  const aLine = document.getElementById('aLine');
  if(aLine){
    const savData = months.map((m,i)=>incData[i]-expData[i]);
    charts.aLine = new Chart(aLine,{type:'line',
      data:{labels:months.map(monthName), datasets:[{label:'Savings', data:savData, borderColor:'#22C55E', backgroundColor:'rgba(34,197,94,.15)', fill:true, tension:.35, pointBackgroundColor:'#22C55E'}]},
      options:{plugins:{legend:{display:false}}, scales:{y:{grid:{color:'#374151'},ticks:{callback:v=>'₹'+v}},x:{grid:{display:false}}}}});
  }
}

let reportPeriod = today().slice(0,7);
let reportKind = 'month';
function renderReports(main){
  main.innerHTML = `
    <div class="page-head fade-in"><div><div class="page-title">Reports</div><div class="page-sub">Summaries you can copy & share.</div></div></div>
    <div class="card fade-in" style="margin-bottom:1.25rem">
      <div class="filters">
        <select id="rKind"><option value="month" ${reportKind==='month'?'selected':''}>Monthly</option><option value="year" ${reportKind==='year'?'selected':''}>Yearly</option></select>
        <input type="${reportKind==='month'?'month':'number'}" id="rPeriod" value="${reportKind==='month'?reportPeriod:reportPeriod.slice(0,4)}"/>
        <button class="btn" id="rGen"><i data-lucide="file-text"></i> Generate</button>
        <button class="btn btn-secondary" id="rCopy"><i data-lucide="clipboard"></i> Copy</button>
      </div>
      <pre class="report" id="rOut">Pick a period and click Generate.</pre>
    </div>`;
  lucide.createIcons();
  document.getElementById('rKind').onchange = e=>{ reportKind=e.target.value; renderPage(); };
  document.getElementById('rPeriod').oninput = e=>{ reportPeriod = reportKind==='month'?e.target.value : e.target.value; };
  document.getElementById('rGen').onclick = ()=>{
    document.getElementById('rOut').textContent = buildReport();
  };
  document.getElementById('rCopy').onclick = ()=>{
    const txt = document.getElementById('rOut').textContent;
    navigator.clipboard.writeText(txt).then(()=>toast('Report copied to clipboard'));
  };
}
function buildReport(){
  const isMonth = reportKind==='month';
  const period = isMonth ? reportPeriod : reportPeriod.slice(0,4);
  if(!period) return 'Please pick a valid period.';
  const filt = arr => arr.filter(x=>isMonth ? x.date.startsWith(period) : x.date.startsWith(period));
  const inc = filt(state.income), exp = filt(state.expenses), pig = filt(state.piggyBank);
  const incT = totals(inc), expT = totals(exp);
  const sav = incT - expT;
  const pigAdded = pig.filter(t=>t.type==='deposit').reduce((s,t)=>s+Number(t.amount),0) - pig.filter(t=>t.type==='withdraw').reduce((s,t)=>s+Number(t.amount),0);
  const catMap = {};
  exp.forEach(e=>catMap[e.category]=(catMap[e.category]||0)+Number(e.amount));
  const lines = [];
  lines.push(`POCKIT — ${isMonth?'Monthly':'Yearly'} Report`);
  lines.push(`Period: ${isMonth?monthName(period):period}`);
  lines.push('─'.repeat(40));
  lines.push(`Income:       ${fmt(incT)}`);
  lines.push(`Expenses:     ${fmt(expT)}`);
  lines.push(`Net Savings:  ${fmt(sav)}  ${sav>=0?'✓':'(loss)'}`);
  lines.push(`Piggy Bank Δ: ${pigAdded>=0?'+':''}${fmt(pigAdded)}`);
  lines.push(`Savings Rate: ${incT?((sav/incT)*100).toFixed(1):'0'}%`);
  lines.push('');
  lines.push('Spending by Category:');
  if(!Object.keys(catMap).length) lines.push('  (no expenses)');
  Object.entries(catMap).sort((a,b)=>b[1]-a[1]).forEach(([k,v])=>{
    lines.push(`  ${k.padEnd(15)} ${fmt(v)}`);
  });
  lines.push('');
  lines.push(`Transactions: ${exp.length} expenses, ${inc.length} income, ${pig.length} piggy`);
  lines.push('─'.repeat(40));
  lines.push('Generated by Pockit 🐷');
  return lines.join('\n');
}

  openModal(`
    <div class="modal-head"><div class="modal-title">Add to "${g.name}"</div>
      <button class="icon-btn" onclick="closeModal()"><i data-lucide="x"></i></button></div>
    <form class="form" id="gAdd">
      <div><label>Amount (₹)</label><input type="number" min="0.01" step="0.01" id="gAddAmt" required/></div>
      <div class="modal-actions">
        <button type="button" class="btn btn-ghost" onclick="closeModal()">Cancel</button>
        <button type="submit" class="btn">Add</button>
      </div>
    </form>`);
  lucide.createIcons();
  document.getElementById('gAdd').onsubmit = e=>{
    e.preventDefault();
    g.saved = Number(g.saved||0) + Number(document.getElementById('gAddAmt').value);
    save(); closeModal(); renderPage();
    toast(g.saved>=g.target ? `🎉 Goal "${g.name}" completed!` : 'Added to goal');
  };
}
function deleteGoal(id){
  confirmModal('Delete goal?','This action cannot be undone.',()=>{
    state.goals = state.goals.filter(g=>g.id!==id); save(); renderPage(); toast('Goal deleted','err');
  });
}

/* ============= BOOTSTRAP ============= */
window.addEventListener('DOMContentLoaded', ()=>{
  renderNav();
  renderPage();
});
</script>
</body>
</html>
